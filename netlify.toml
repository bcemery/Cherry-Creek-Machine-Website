# Cherry Creek Machine — Netlify Configuration

[build]
  publish = "."

# Pretty URLs: ensures /about/index.html is served at /about/
# and /about.html references in HTML are rewritten to /about
[build.processing.html]
  pretty_urls = true

# Force www → non-www (fixes GSC "Page with redirect" errors)
[[redirects]]
  from = "https://www.ccmachine.com/*"
  to   = "https://ccmachine.com/:splat"
  status = 301
  force  = true
