<!-- Google Analytics 4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-BBQYVMGJ3W"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-BBQYVMGJ3W');

// ── Conversion event: quote form submission ──────────────────────────────────
// Fires once when the thank-you page loads, meaning a form was successfully
// submitted. GA4 event name 'generate_lead' is the recommended standard for
// B2B quote/contact forms and maps directly to a GA4 conversion goal.
// utm_content is pulled from the referrer URL so GA4 can attribute the
// conversion back to the originating service page CTA.
(function() {
  try {
    var ref = document.referrer || '';
    var utmContent = '';
    if (ref.indexOf('utm_content=') !== -1) {
      utmContent = decodeURIComponent(ref.split('utm_content=')[1].split('&')[0]);
    }
    gtag('event', 'generate_lead', {
      event_category:  'quote_form',
      event_label:     utmContent || 'direct',
      source_page:     utmContent || 'direct',
      method:          'netlify_form',
      currency:        'USD',
      value:           1
    });
  } catch(e) {}
})();
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{--black:#141210;--dark:#1C1A18;--steel:#242220;--panel:#2C2A27;--border:#3A3733;--border2:#4A4744;--text:#C8C3BC;--muted:#7A7470;--white:#F5F2EE;--warm:#EAE5DE;--red:#B8240F;--red2:#962010;--red-dim:rgba(184,36,15,0.08);--display:'Barlow Condensed',sans-serif;--body:'Barlow',sans-serif;--mono:'DM Mono',monospace}
body{background:var(--dark);color:var(--text);font-family:var(--body);font-weight:400;line-height:1.65;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;-webkit-font-smoothing:antialiased}
.ty-icon{width:80px;height:80px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 28px;font-size:36px;color:#fff;animation:scaleIn 0.5s 0.2s cubic-bezier(0.16,1,0.3,1) both}
@keyframes scaleIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.ty-title{font-family:var(--display);font-size:clamp(36px,5vw,56px);font-weight:900;text-transform:uppercase;color:var(--white);line-height:0.95;margin-bottom:16px;animation:fadeUp 0.6s 0.4s ease both;opacity:0}
.ty-title em{font-style:normal;color:var(--red)}
.ty-sub{font-size:16px;color:var(--text);max-width:480px;line-height:1.8;margin:0 auto 32px;animation:fadeUp 0.6s 0.55s ease both;opacity:0}
.ty-sub strong{color:var(--warm);font-weight:500}
.ty-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;animation:fadeUp 0.6s 0.7s ease both;opacity:0}
.ty-btn{background:var(--red);color:#fff;font-family:var(--display);font-size:13px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;padding:14px 28px;text-decoration:none;border-radius:2px;transition:background 0.2s;display:inline-flex;align-items:center;gap:8px}
.ty-btn:hover{background:var(--red2)}
.ty-btn-ghost{color:var(--warm);font-family:var(--display);font-size:13px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;padding:13px 22px;text-decoration:none;border:1px solid var(--border2);border-radius:2px;transition:border-color 0.2s,color 0.2s;display:inline-flex;align-items:center;gap:8px}
.ty-btn-ghost:hover{border-color:var(--red);color:var(--red)}
.ty-contact{margin-top:40px;font-family:var(--mono);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);animation:fadeUp 0.6s 0.85s ease both;opacity:0}
.ty-contact a{color:var(--red);text-decoration:none;transition:color 0.2s}
.ty-contact a:hover{color:var(--white)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
</style>
</head>

<div class="ty-actions">
  <a href="/" class="ty-btn">Back to Homepage →</a>

</div>
<div class="ty-contact">
  Need something sooner? Call us at <a href="tel:9189259780">(918) 925-9780</a>
</div>
</body>
